<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- IMPORTANT for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mobile Video BG</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Video Background */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Dark overlay for better text visibility */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* Content center */
        .content {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
        }

        p {
            font-size: 16px;
            margin-top: 10px;
        }

        /* Desktop pe thoda bada */
        @media (min-width: 768px) {
            h1 {
                font-size: 40px;
            }
            p {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline>
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
        <div>
            <h1>🔥 Mobile Friendly Site</h1>
            <p>Ab desktop jaisa zoom-out nahi lagega 😎</p>
        </div>
    </div>

</body>
</html>
